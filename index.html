<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessão 10 — Gestão de Sessões</title>
    <link rel="shortcut icon" href="imagens/documentos.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400,100;9..144,600,100;9..144,700,100&family=Sora:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#2D6A4F">
    <link rel="stylesheet" href="css/base/style.css">
    <link rel="stylesheet" href="css/components/popovers.css">
    <link rel="stylesheet" href="css/modules/listaClientes.css">
    <link rel="stylesheet" href="css/modules/listaSessoes.css">
    <link rel="stylesheet" href="css/modules/dashboard.css">
    <link rel="stylesheet" href="css/modules/formCliente.css">
    <link rel="stylesheet" href="css/modules/infoCliente.css">
    <link rel="stylesheet" href="css/modules/login.css">
</head>
<body>
      <!-- LOGIN SCREEN -->
      <div id="login-screen" class="visible">
        <div class="login-card">
          <div class="login-header">
            <div class="login-brand">
              <span class="brand-word">Sessão</span>
              <span class="brand-badge">10</span>
            </div>
            <p class="brand-sub">Gestão de Sessões</p>
            <p class="login-sub">Faça login para continuar</p>
          </div>
          <form id="login-form" autocomplete="on">
            <div class="login-field">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" name="email" placeholder="seu@email.com" required autocomplete="email" spellcheck="false">
            </div>
            <div class="login-field">
              <label for="login-password">Senha</label>
              <input type="password" id="login-password" name="password" placeholder="Sua senha" required autocomplete="current-password">
            </div>
            <p id="login-error" class="login-error" aria-live="polite"></p>
            <button type="submit" id="login-submit">Entrar</button>
            <p class="login-toggle">
              <a href="#" id="login-toggle-link">Criar uma nova conta</a>
            </p>
          </form>
        </div>
      </div>

      <div id="modal-cancelar" style="display:none; position:fixed; inset:0; background:#0006; z-index:9999; align-items:center; justify-content:center;" onclick="if(event.target===this) fecharModalCancelar()">
        <div style="background:#fff; border-radius:12px; padding:24px; width:90%; max-width:400px;">
          <h3 style="margin:0 0 12px">Cancelar sessão</h3>
          <textarea id="motivo-cancelamento" maxlength="200" placeholder="Motivo do cancelamento..."
            style="width:100%; height:100px; resize:none; border:1px solid #ddd; border-radius:8px; padding:10px; font-size:14px; box-sizing:border-box;"></textarea>
          <div style="text-align:right; font-size:12px; color:#999; margin-top:4px;">
            <span id="contador-motivo">0</span>/200
          </div>
          <div style="display:flex; gap:8px; margin-top:16px; justify-content:flex-end;">
            <button onclick="confirmarCancelamento()" style="padding:8px 16px; border-radius:8px; border:none; background:#e53935; color:#fff; cursor:pointer;">Cancelar sessão</button>
          </div>
        </div>
      </div>

      <!-- HEADER -->
      <header class="header">
        <div class="header-brand">
          <span class="brand-word">Sessão</span>
          <span class="brand-badge">10</span>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <span id="user-email" style="font-size:12px; opacity:0.8;"></span>
          <div class="relogio-box">
            <span id="relogio">00:00:00</span>
            <span id="dataHoje"></span>
          </div>
          <button id="logout-btn" style="display:none;">Sair</button>
        </div>
      </header>

          <!-- POPOVERS -->

          <!-- INFO CLIENTE -->
          <div class="popoverCliente">
            <div class="infoCliente">

            </div>
          </div>

          <!-- NOVA SESSÃO -->
          <div class="popoverSessao">
            <div class="infoSessao">
              <h3>📅 Nova Sessão</h3>
          
              <!-- Tipo de sessão -->
              <div class="tipo-sessao">
                <button type="button" class="tipo-tab ativo" data-tipo="avulsa" onclick="setTipoSessao('avulsa')">Sessão Avulsa</button>
                <button type="button" class="tipo-tab" data-tipo="pacote" onclick="setTipoSessao('pacote')">Pacote de Sessões</button>
              </div>
          
              <!-- Cliente (comum aos dois) -->
              <label for="clienteSessao">Cliente</label>
              <input type="text" id="clienteSessao" name="cliente" placeholder="Buscar cliente…" autocomplete="off" oninput="filtrarClientes()">
              <div class="clientesDropdown" id="clientesDropdown"></div>
          
              <!-- Serviço (comum aos dois) -->
              <label for="servicoSessao">Serviço</label>
              <input type="text" maxlength="50" id="servicoSessao" name="servico" placeholder="Ex: Drenagem Linfática…" autocomplete="off">
          
              <!-- SESSÃO AVULSA -->
              <div id="campos-avulsa">
                <label for="valorSessao">Valor da Sessão</label>
                <input type="text" id="valorSessao" name="valor_sessao" placeholder="R$ 0,00" autocomplete="off" oninput="mascaraValor(this)">
          
                <label for="dataSessao">Data</label>
                <input type="date" id="dataSessao" name="data_sessao" autocomplete="off">
          
                <label for="horaSessao">Horário</label>
                <input type="time" id="horaSessao" name="hora_sessao" autocomplete="off">
          
                <label for="obsSessao">Observações</label>
                <textarea id="obsSessao" name="obs_sessao" maxlength="100" placeholder="Observações…" autocomplete="off"></textarea>
              </div>
          
              <!-- PACOTE DE SESSÕES -->
              <div id="campos-pacote" style="display:none">
                <label for="qtdSessoesPacote">Qtd. de sessões contratadas</label>
                <input type="number" id="qtdSessoesPacote" name="qtd_pacote" placeholder="Ex: 10" min="1" autocomplete="off">
          
                <label for="valorPacote">Valor do Pacote</label>
                <input type="text" id="valorPacote" name="valor_pacote" placeholder="R$ 0,00" autocomplete="off" oninput="mascaraValor(this)">
          
                <label for="obsPacote">Observações</label>
                <textarea id="obsPacote" name="obs_pacote" maxlength="100" placeholder="Observações…" autocomplete="off"></textarea>
              </div>
          
              <div class="sessao-acoes">
                <button type="button" id="cadastrar-sessao" onclick="cadastrarSessao()">✅ Cadastrar</button>
              </div>
            </div>
          </div>

          
        <!-- MAIN -->
          <main class="conteiner">
              <!--FORMULÁRIO -->
              <section class="form">
                 <!-- 👤 CLIENTE -->
                  <form id="clienteForm">
                  
                    <div class="informacoesCliente">
                      <h3>👤 Informações do Cliente</h3>
                  
                      <label for="nomeCliente">Nome</label>
                      <input type="text" id="nomeCliente" name="nome" autocomplete="name">
                  
                      <label for="telefone">Telefone</label>
                      <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" autocomplete="tel" inputmode="numeric">
                  
                      <label for="cpf">CPF</label>
                      <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" autocomplete="off">

                      <label for="cep">CEP</label>
                      <input type="text" id="cep" name="cep" placeholder="00000-000" autocomplete="postal-code">
                  
                      <label for="endereco">Endereço</label>
                      <input maxlength="100" type="text" id="endereco" name="endereco" autocomplete="street-address">

                      <label for="numero">Número</label>
                      <input type="text" id="numero" name="numero" maxlength="10" autocomplete="address-line2">
                    </div>
                
                  <div class="cadastrar">
                    <button type="button" class="addCliente" onclick="cadastrarCliente()">Cadastrar Cliente</button>
                  </div>

                  </form>

                  <button type="button" class="sessaoBtn" onclick="abrirPopoverSessao()">
                    <h2>➕ Nova Sessão</h2>
                  </button>
                </section>
                
              

              










              
              <!-- LISTA DE CLIENTES -->
              <section class="listaClientes">
                <h2>Clientes Cadastrados</h2>
                <input type="text" id="BuscarCliente" placeholder="Buscar Cliente…" aria-label="Buscar cliente" oninput="filtrarClientesLista()">
                <div class="clientesConteiner">

                </div>
              </section>
















            <!-- LISTA DE SESSÕES -->
          <section id="listaSessoes">
            <div class="sessoes-header">
              <h2>Sessões</h2>
            </div>

            <!-- ABAS -->
            <div class="tabs">
              <button class="tab ativo" onclick="trocarAba('hoje')" id="tab-hoje">
                <span class="pulsing-dot" id="dot-hoje"></span>
                Sessões de Hoje
              </button>
              <button class="tab" onclick="trocarAba('calendario')" id="tab-calendario">
                📅 Calendário
              </button>
              <button class="tab" onclick="trocarAba('historico')" id="tab-historico">
                📜 Histórico
              </button>
            </div>

            <!-- ABA: HOJE -->
            <div class="painel ativo" id="painel-hoje">
              <div id="lista-hoje">
                <p class="vazio">Nenhuma sessão marcada para hoje.</p>
              </div>
            </div>

            <!-- ABA: CALENDÁRIO -->
            <div class="painel" id="painel-calendario">
              <div class="cal-header">
                <button class="cal-nav" onclick="mudarMes(-1)">← Anterior</button>
                <span class="cal-mes" id="calMes"></span>
                <button class="cal-nav" onclick="mudarMes(1)">Próximo →</button>
              </div>
              <div id="calLista"></div>
            </div>

            <!-- ABA: HISTÓRICO -->
            <div class="painel" id="painel-historico">
              <div id="lista-historico">
                <p class="vazio">Nenhuma sessão concluída ainda.</p>
              </div>
            </div>

          </section>



          <!-- DASHBOARD -->
          <section class="dashboard">
            <div class="dash" id="dash-root"></div>
          </section>

          </main>






<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.0.0/dist/umd/supabase.js"></script>
<script src="js/core/supabase-config.js"></script>
<script src="js/core/supabase.js"></script>
<script src="js/core/auth.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/modules/clientes.js"></script>
<script src="js/utils/masks.js"></script>
<script src="js/utils/formatters.js"></script>
<script src="js/modules/infoCliente.js"></script>
<script src="js/modules/sessoes.js"></script>
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/modal.js"></script>
<script src="js/main.js"></script>
<script src="api/cep.js"></script>


          

</body>
</html>
