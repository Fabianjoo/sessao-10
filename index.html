<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Pedidos</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/popovers.css">
    <link rel="stylesheet" href="estilos/listaClientes.css">
    <link rel="stylesheet" href="estilos/listaSessoes.css">
    <link rel="stylesheet" href="estilos/dashboard.css">
    <link rel="stylesheet" href="estilos/formCliente.css">
    <link rel="stylesheet" href="estilos/infoCliente.css">
</head>
      <div id="modal-cancelar" style="display:none; position:fixed; inset:0; background:#0006; z-index:9999; align-items:center; justify-content:center;" onclick="if(event.target===this) fecharModalCancelar()">
        <div style="background:#fff; border-radius:12px; padding:24px; width:90%; max-width:400px;">
          <h3 style="margin:0 0 12px">Cancelar sessão</h3>
          <textarea id="motivo-cancelamento" maxlength="200" placeholder="Motivo do cancelamento..."
            style="width:100%; height:100px; resize:none; border:1px solid #ddd; border-radius:8px; padding:10px; font-size:14px; box-sizing:border-box;"></textarea>
          <div style="text-align:right; font-size:12px; color:#999; margin-top:4px;">
            <span id="contador-motivo">0</span>/200
          </div>
          <div style="display:flex; gap:8px; margin-top:16px; justify-content:flex-end;">
            <button onclick="confirmarCancelamento()" style="padding:8px 16px; border-radius:8px; border:none; background:#e53935; color:#fff; cursor:pointer;">Cancelar sessão</button>
          </div>
        </div>
      </div>
<body>
      <!-- HEADER -->
      <header class="header">
        <h1>Gerenciador de Sessões</h1>
        <div class="relogio-box">
          <span id="relogio">00:00:00</span>
          <span id="dataHoje"></span>
        </div>
      </header>

          <!-- POPOVERS -->

          <!-- INFO CLIENTE -->
          <div class="popoverCliente">
            <div class="infoCliente">

            </div>
          </div>

          <!-- NOVA SESSÃO -->
          <div class="popoverSessao">
            <div class="infoSessao">
              <h3>📅 Nova Sessão</h3>
          
              <!-- Tipo de sessão -->
              <div class="tipo-sessao">
                <button type="button" class="tipo-tab ativo" data-tipo="avulsa" onclick="setTipoSessao('avulsa')">Sessão Avulsa</button>
                <button type="button" class="tipo-tab" data-tipo="pacote" onclick="setTipoSessao('pacote')">Pacote de Sessões</button>
              </div>
          
              <!-- Cliente (comum aos dois) -->
              <label for="clienteSessao">Cliente</label>
              <input type="text" id="clienteSessao" placeholder="Buscar cliente..." oninput="filtrarClientes()">
              <div class="clientesDropdown" id="clientesDropdown"></div>
          
              <!-- Serviço (comum aos dois) -->
              <label for="servicoSessao">Serviço</label>
              <input type="text" maxlength="50" id="servicoSessao" placeholder="Ex: Drenagem Linfática...">
          
              <!-- SESSÃO AVULSA -->
              <div id="campos-avulsa">
                <label for="valorSessao">Valor da Sessão</label>
                <input type="text" id="valorSessao" placeholder="R$ 0,00" oninput="mascaraValor(this)">
          
                <label for="dataSessao">Data</label>
                <input type="date" id="dataSessao">
          
                <label for="horaSessao">Horário</label>
                <input type="time" id="horaSessao">
          
                <label for="obsSessao">Observações</label>
                <textarea id="obsSessao" maxlength="100" placeholder="Observações..."></textarea>
              </div>
          
              <!-- PACOTE DE SESSÕES -->
              <div id="campos-pacote" style="display:none">
                <label for="qtdSessoesPacote">Qtd. de sessões contratadas</label>
                <input type="number" id="qtdSessoesPacote" placeholder="Ex: 10" min="1">
          
                <label for="valorPacote">Valor do Pacote</label>
                <input type="text" id="valorPacote" placeholder="R$ 0,00" oninput="mascaraValor(this)">
          
                <label for="obsPacote">Observações</label>
                <textarea id="obsPacote" maxlength="100" placeholder="Observações..."></textarea>
              </div>
          
              <div class="sessao-acoes">
                <button type="button" id="cadastrar-sessao" onclick="cadastrarSessao()">✅ Cadastrar</button>
              </div>
            </div>
          </div>

          
        <!-- MAIN -->
          <main class="conteiner">
              <!--FORMULÁRIO -->
              <section class="form">
                 <!-- 👤 CLIENTE -->
                <form id="clienteForm">
                 
                  <div class="informacoesCliente">
                    <h3>👤 Informações do Cliente</h3>
                
                    <label for="nomeCliente">Nome</label>
                    <input type="text" id="nomeCliente">
                
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000">
                
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf"  placeholder="000.000.000-00">
                
                    <label for="endereco">Endereço</label>
                    <input maxlength="100" type="text" id="endereco">

                    <label for="cep">CEP</label>
                    <input type="text" id="cep" placeholder="00000-000">

                    <label for="numero">Número</label>
                    <input type="text" id="numero" maxlength="10">
                  </div>
                
                  <div class="cadastrar">
                    <button type="button" class="addCliente" onclick="cadastrarCliente()">Cadastrar Cliente</button>
                  </div>

                  </form>

                  <div class="sessaoBtn" onclick="abrirPopoverSessao()">
                    <h2>➕ Nova Sessão</h2>
                  </div>
                </section>
                
              

              










              
              <!-- LISTA DE CLIENTES -->
              <section class="listaClientes">
                <h2>Clientes Cadastrados</h2>
                <input type="text" id="BuscarCliente" placeholder="Buscar Cliente..." oninput="filtrarClientesLista()">
                <div class="clientesConteiner">

                </div>
              </section>
















            <!-- LISTA DE SESSÕES -->
          <section id="listaSessoes">
            <div class="sessoes-header">
              <h2>Sessões</h2>
            </div>

            <!-- ABAS -->
            <div class="tabs">
              <button class="tab ativo" onclick="trocarAba('hoje')" id="tab-hoje">
                <span class="pulsing-dot" id="dot-hoje"></span>
                Sessões de Hoje
              </button>
              <button class="tab" onclick="trocarAba('calendario')" id="tab-calendario">
                📅 Calendário
              </button>
              <button class="tab" onclick="trocarAba('historico')" id="tab-historico">
                📜 Histórico
              </button>
            </div>

            <!-- ABA: HOJE -->
            <div class="painel ativo" id="painel-hoje">
              <div id="lista-hoje">
                <p class="vazio">Nenhuma sessão marcada para hoje.</p>
              </div>
            </div>

            <!-- ABA: CALENDÁRIO -->
            <div class="painel" id="painel-calendario">
              <div class="cal-header">
                <button class="cal-nav" onclick="mudarMes(-1)">← Anterior</button>
                <span class="cal-mes" id="calMes"></span>
                <button class="cal-nav" onclick="mudarMes(1)">Próximo →</button>
              </div>
              <div id="calLista"></div>
            </div>

            <!-- ABA: HISTÓRICO -->
            <div class="painel" id="painel-historico">
              <div id="lista-historico">
                <p class="vazio">Nenhuma sessão finalizada ainda.</p>
              </div>
            </div>

          </section>



          <!-- DASHBOARD -->
          <section class="dashboard">
            <div class="dash" id="dash-root"></div>
          </section>

          </main>






<script src="scripts/addCliente.js"></script>
<script src="scripts/padronizacao.js"></script>
<script src="scripts/infoCliente.js"></script>
<script src="scripts/sessoes.js"></script>
<script src="scripts/dashboard.js"></script>
<script src="scripts/modal.js"></script>


          

</body>
</html>
